<!DOCTYPE html>
<html lang="en" class="scroll-smooth overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Variant 5 | The Charge Grid</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./dist/style.css">

    <!-- Font Awesome -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Dosis:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Dosis', sans-serif; }
        h1, h2, h3, h4, h5, h6, .font-display { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="bg-black text-white antialiased relative overflow-x-hidden">

    <!-- Glass Navbar -->
    <nav class="fixed w-full z-50 py-4 px-4 sm:px-6 lg:px-8 top-0">
        <div class="max-w-7xl mx-auto bg-white/5 border border-white/10 backdrop-blur-xl rounded-2xl px-6 py-3 flex justify-between items-center">
            <a href="/" class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-linear-to-tr from-fuchsia-600 to-blue-600 flex items-center justify-center text-white text-base shadow-[0_0_15px_rgba(192,38,211,0.5)]">
                    <i data-lucide="zap" ></i>
                </div>
                <span class="font-display font-bold text-xl tracking-tight text-white">GRID<span class="text-fuchsia-500">X</span></span>
            </a>
            <div class="hidden md:flex gap-8 items-center">
                <a href="#" class="text-slate-300 text-base hover:text-white transition-colors">Features</a>
                <a href="#" class="text-slate-300 text-base hover:text-white transition-colors">Network</a>
                <a href="#" class="text-slate-300 text-base hover:text-white transition-colors">Pricing</a>
            </div>
            <a href="#" class="px-5 py-2 bg-white text-black font-semibold rounded-lg hover:bg-slate-200 transition-colors text-base">Join Waitlist</a>
        </div>
    </nav>

    <!-- DARK NEON HERO SECTION -->
    <section class="relative min-h-screen flex items-center pt-32 pb-20 overflow-hidden">
        <!-- Intense Neon Background -->
        <div class="absolute inset-0 z-0 overflow-hidden">
            <!-- Grid lines -->
            <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.05)_1px,transparent_1px)] bg-size-[4rem_4rem] mask-[radial-gradient(ellipse_60%_50%_at_50%_50%,#000_70%,transparent_100%)]"></div>

            <!-- Glowing orbs -->
            <div class="absolute top-1/4 left-1/4 w-160 h-160 bg-fuchsia-600/20 rounded-full blur-[120px] mix-blend-screen animate-pulse"></div>
            <div class="absolute bottom-1/4 right-1/4 w-120 h-120 bg-blue-600/20 rounded-full blur-[100px] mix-blend-screen animate-pulse" style="animation-delay: 1s;"></div>
        </div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10 w-full">
            <div class="text-center max-w-4xl mx-auto">

                <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-white/5 border border-white/10 text-slate-300 text-sm font-medium mb-8">
                    <span class="w-2 h-2 rounded-full bg-fuchsia-500 shadow-[0_0_8px_rgba(192,38,211,0.8)] animate-pulse"></span>
                    The future of charging is here
                </div>

                <h1 class="font-display text-6xl md:text-8xl lg:text-9xl font-bold text-white mb-6 tracking-tighter leading-none">
                    Hyper<span class="text-transparent bg-clip-text bg-linear-to-r from-fuchsia-500 to-blue-500">Charge</span>
                </h1>

                <p class="text-xl md:text-2xl text-slate-400 mb-10 max-w-2xl mx-auto font-light">
                    Experience the next evolution of EV infrastructure. Faster, smarter, and infinitely scalable.
                </p>

                <div class="flex flex-col sm:flex-row justify-center gap-4">
                    <button class="px-8 py-4 bg-white text-black font-bold rounded-xl hover:bg-slate-200 transition-colors text-lg">Explore Technology</button>
                </div>
            </div>

            <!-- Conceptual UI / Data Visualization -->
            <div class="mt-24 relative max-w-5xl mx-auto">
                <div class="absolute inset-0 bg-linear-to-t from-black via-transparent to-transparent z-20"></div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 opacity-80">
                    <div class="h-40 bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col justify-end">
                        <div class="text-fuchsia-500 text-sm font-mono mb-1">LATENCY</div>
                        <div class="text-3xl font-display text-white">12<span class="text-base text-slate-500">ms</span></div>
                    </div>
                    <div class="h-40 bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col justify-end">
                        <div class="text-blue-500 text-sm font-mono mb-1">NETWORK LOAD</div>
                        <div class="text-3xl font-display text-white">84<span class="text-base text-slate-500">%</span></div>
                    </div>
                    <div class="h-40 bg-linear-to-br from-fuchsia-600/20 to-blue-600/20 border border-fuchsia-500/30 rounded-2xl p-4 flex flex-col justify-end relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-16 h-16 bg-fuchsia-500/50 blur-2xl"></div>
                        <div class="text-white text-sm font-mono mb-1">ACTIVE NODES</div>
                        <div class="text-3xl font-display text-white">12,405</div>
                    </div>
                    <div class="h-40 bg-white/5 border border-white/10 rounded-2xl p-4 flex flex-col justify-end">
                        <div class="text-emerald-500 text-sm font-mono mb-1">SECURITY</div>
                        <div class="text-3xl font-display text-white">SECURE</div>
                    </div>
                </div>
            </div>

        </div>
    </section>



    <!-- SCRIPTS -->
    <script src="./js/main.js"></script>

    <!-- Initialize Lucide Icons -->
    <script>
        lucide.createIcons();
    </script>

</body>
</html>
