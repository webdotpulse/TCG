<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Variant 4 | The Charge Grid</title>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./dist/style.css">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="bg-white text-slate-900 antialiased relative overflow-x-hidden">

    <!-- Minimal Navbar -->
    <nav class="absolute w-full z-50 py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between items-center">
            <a href="/" class="flex items-center gap-3">
                <div class="w-8 h-8 bg-slate-900 rounded flex items-center justify-center text-white font-bold text-sm">
                    <i class="fas fa-bolt"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tight text-slate-900">TCG.</span>
            </a>
            <div class="hidden md:flex gap-10 items-center">
                <a href="#" class="text-slate-500 text-sm font-semibold hover:text-slate-900 transition-colors tracking-wide uppercase">Software</a>
                <a href="#" class="text-slate-500 text-sm font-semibold hover:text-slate-900 transition-colors tracking-wide uppercase">Hardware</a>
                <a href="#" class="text-slate-500 text-sm font-semibold hover:text-slate-900 transition-colors tracking-wide uppercase">Company</a>
            </div>
            <a href="#" class="text-slate-900 font-bold hover:underline underline-offset-4 decoration-2">Sign In</a>
        </div>
    </nav>

    <!-- MINIMALIST HERO SECTION -->
    <section class="min-h-screen flex items-center pt-24 pb-20 relative">
        <!-- Subtle Background Accent -->
        <div class="absolute top-0 right-0 w-1/2 h-screen bg-slate-50 -z-10 hidden lg:block"></div>

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full relative z-10">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">

                <!-- Text Content -->
                <div class="lg:col-span-7">
                    <h1 class="text-6xl md:text-8xl font-black text-slate-900 leading-[1.05] tracking-tighter mb-8">
                        The minimal <br>
                        approach to <br>
                        <span class="text-brand-blue">EV charging.</span>
                    </h1>
                    <p class="text-xl text-slate-500 mb-12 max-w-lg leading-relaxed">
                        We removed the complexity. What remains is a beautiful, intuitive platform that just works. Designed for modern businesses.
                    </p>
                    <div class="flex items-center gap-6">
                        <a href="#" class="pb-1 border-b-2 border-slate-900 text-slate-900 font-bold hover:text-brand-blue hover:border-brand-blue transition-colors text-lg flex items-center gap-2">
                            Discover the platform <i class="fas fa-arrow-right text-sm"></i>
                        </a>
                    </div>
                </div>

                <!-- Abstract Visual -->
                <div class="lg:col-span-5 flex justify-center lg:justify-end">
                    <div class="relative w-full max-w-md aspect-square">
                        <!-- Abstract shapes representing charging/energy -->
                        <div class="absolute inset-0 bg-slate-100 rounded-full"></div>
                        <div class="absolute top-1/4 left-1/4 right-1/4 bottom-1/4 bg-brand-blue rounded-full mix-blend-multiply opacity-80 animate-pulse"></div>
                        <div class="absolute top-1/3 left-1/3 right-1/3 bottom-1/3 bg-brand-teal rounded-full mix-blend-multiply opacity-80 animate-pulse" style="animation-delay: 0.5s;"></div>
                        <!-- Simple Card Overlay -->
                        <div class="absolute bottom-10 -left-10 bg-white p-6 rounded-2xl shadow-2xl border border-slate-100 w-64">
                            <div class="text-sm text-slate-500 font-medium mb-1">Energy Delivered</div>
                            <div class="text-3xl font-black text-slate-900">1.2 GWh</div>
                            <div class="mt-4 h-2 bg-slate-100 rounded-full overflow-hidden">
                                <div class="h-full bg-slate-900 w-3/4"></div>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- LOGO CLOUD (Minimal) -->
    <section class="py-16 border-t border-slate-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <p class="text-center text-xs font-bold text-slate-400 tracking-widest uppercase mb-10">Powering innovative teams</p>
            <div class="flex justify-center gap-12 md:gap-24 opacity-30 grayscale">
                <i class="fab fa-stripe text-4xl"></i>
                <i class="fab fa-airbnb text-4xl"></i>
                <i class="fab fa-spotify text-4xl"></i>
                <i class="fab fa-figma text-4xl"></i>
            </div>
        </div>
    </section>

    <!-- SCRIPTS -->
    <script src="./js/main.js"></script>
</body>
</html>
