<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | The Charge Grid</title>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="./dist/style.css">
    <!-- Font Awesome (Lucide) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 antialiased relative overflow-x-hidden min-h-screen flex flex-col">

    <!-- Background Decoration -->
    <div class="bg-glow"></div>

    <!-- SIMPLE NAVIGATION -->
    <header class="w-full py-6 px-4 md:px-6 flex justify-between items-center max-w-7xl mx-auto relative z-10">
        <a href="index.html" class="flex items-center gap-2.5 group">
            <div class="w-9 h-9 bg-brand-blue rounded-xl flex items-center justify-center text-white font-bold shadow-md">
                <i data-lucide="zap" ></i>
            </div>
            <span class="font-bold text-2xl tracking-tight text-slate-900">The Charge Grid</span>
        </a>
        <a href="index.html" class="text-slate-500 hover:text-brand-blue font-semibold flex items-center gap-1.5 transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Home
        </a>
    </header>

    <!-- FORGOT PASSWORD MAIN CONTENT -->
    <main class="flex-grow flex items-center justify-center px-4 py-12 relative z-10">
        <div class="bg-white rounded-[2rem] shadow-xl border border-slate-100 p-8 sm:p-12 w-full max-w-md relative overflow-hidden">
            <!-- Decorative circle -->
            <div class="absolute -top-12 -right-12 w-32 h-32 bg-slate-200/50 rounded-full blur-2xl"></div>

            <div class="text-center mb-8 relative z-10">
                <div class="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto mb-4 border border-slate-100 shadow-sm">
                    <i data-lucide="key" class="text-slate-700 w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-900 mb-2">Reset Password</h1>
                <p class="text-slate-500 text-base">Enter your email and we'll send you a link to reset your password.</p>
            </div>

            <form class="space-y-6 relative z-10">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1.5" for="email">Email Address</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="w-5 h-5 text-slate-400"></i>
                        </div>
                        <input type="email" id="email" class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:border-slate-400 focus:ring-2 focus:ring-slate-200 transition-all text-slate-900 text-base" placeholder="name@company.com" required>
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-3.5 rounded-xl font-bold text-lg transition-all shadow-md hover:shadow-lg hover:-translate-y-0.5">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-8 text-center relative z-10">
                <p class="text-slate-500 text-base">
                    Remember your password? <a href="login.html" class="font-bold text-slate-700 hover:text-brand-blue transition-colors">Back to login</a>
                </p>
            </div>
        </div>
    </main>

    <!-- FOOTER SIMPLE -->
    <footer class="py-6 text-center text-slate-400 text-sm font-medium">
        &copy; 2026 The Charge Grid. All rights reserved.
    </footer>

    <!-- SCRIPTS -->
    <script src="./js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
